workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.salles.vilasmagazine
      vars:
        BUILD_NAME: 1.0.0
    scripts:
      - name: Validate App Store Connect variables
        script: |
          set -euo pipefail
          if [ -z "${APP_APPLE_ID:-}" ]; then
            echo "APP_APPLE_ID must be configured in Codemagic environment variables."
            exit 1
          fi
      - name: Generate Flutter iOS Swift Package
        script: |
          flutter clean
          flutter pub get
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Flutter build ipa
        script: |
          set -euo pipefail
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_APPLE_ID" --platform IOS --all-versions)
          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            LATEST_BUILD_NUMBER=0
          fi
          NEXT_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$NEXT_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
